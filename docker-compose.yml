version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.local
    ports:
      - "8000:8000"
    environment:
      - GCP_PROJECT_ID=${GCP_PROJECT_ID:-personal-projects-473219}
      - FIRESTORE_DATABASE=${FIRESTORE_DATABASE:-family-expense-tracker-dev}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_APPLICATION_CREDENTIALS=/secrets/gcloud.json
      - ENVIRONMENT=development
      - FRONTEND_URL=http://localhost:5173
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
    volumes:
      - ./backend/app:/app/app:ro
      # Mount Google Cloud credentials for local development
      - ~/.config/gcloud/application_default_credentials.json:/secrets/gcloud.json:ro
    env_file:
      - ./backend/.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - expense-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8000
        - VITE_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
    ports:
      - "5173:80"
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
    depends_on:
      - backend
    networks:
      - expense-network

  # Local development with hot reload
  frontend-dev:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - backend
    networks:
      - expense-network
    profiles:
      - dev

  firebase:
    build:
      context: .
      dockerfile: backend/emulator.Dockerfile
    ports:
      - "4000:4000"
      - "8080:8080"
      - "9099:9099"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - expense-network

  backend-dev:
    build:
      context: ./backend
      dockerfile: Dockerfile.local
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      FIRESTORE_EMULATOR_HOST: firebase:8080
      FIREBASE_AUTH_EMULATOR_HOST: firebase:9099
      GCP_PROJECT_ID: demo-family-expense-tracker
      FIRESTORE_DATABASE: (default)
      ENVIRONMENT: local
    env_file:
      - ./backend/.env.local
    depends_on:
      firebase:
        condition: service_healthy
    networks:
      - expense-network

networks:
  expense-network:
    driver: bridge

volumes:
  firebase-data:
