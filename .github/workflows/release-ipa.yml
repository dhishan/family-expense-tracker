name: Release IPA

# Tag-triggered (push `mobile-v1.0.1` to release) + workflow_dispatch fallback.
# Builds an unsigned IPA, creates a GitHub Release, and updates the shared
# AltStore source on GCS + the legacy Firebase mirror.
#
# Tag trigger avoids macOS runs on every mobile/** commit. JS-only changes
# ship via mobile-ota.yml (cheap Linux runner) — only re-cut a tag when
# native deps or app.json icons/perms change.

on:
  push:
    tags:
      - 'mobile-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.0.5). Will create + push mobile-v<version>.'
        required: true
        type: string

concurrency:
  group: release-ipa
  cancel-in-progress: false

permissions:
  contents: write   # to create tags + GH Release
  id-token: write   # WIF auth to GCP for shared bucket upload

jobs:
  build-ipa:
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need tags to compute next version

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            NEXT="${{ inputs.version }}"
          else
            # Tag push: github.ref_name is e.g. "mobile-v1.0.1"
            NEXT="${GITHUB_REF_NAME#mobile-v}"
          fi
          echo "version=$NEXT" >> $GITHUB_OUTPUT
          echo "tag=mobile-v$NEXT" >> $GITHUB_OUTPUT
          echo "Releasing mobile-v$NEXT"

      - name: Build changelog from commits since last mobile tag
        id: changelog
        run: |
          PREV=$(git tag -l 'mobile-v*' --sort=-v:refname | grep -v "^mobile-v${{ steps.ver.outputs.version }}$" | head -1)
          if [ -z "$PREV" ]; then
            RANGE="HEAD"
          else
            RANGE="$PREV..HEAD"
          fi
          LOG=$(git log "$RANGE" --no-merges --pretty=format:'%s' -- mobile/ backend/app/ \
            | grep -vE '^(chore|ci|docs|test)(\(|:)' \
            | sed -E 's/^(feat|fix|perf)\([^)]*\): */- /; s/^(feat|fix|perf): */- /' \
            | sed -E 's/^([A-Za-z])/- \1/' \
            | head -10)
          if [ -z "$LOG" ]; then
            LOG="- Minor improvements and fixes"
          fi
          echo "log<<EOF" >> "$GITHUB_OUTPUT"
          echo "$LOG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install mobile deps
        working-directory: mobile
        run: npm ci

      - name: Inject release version into app.json
        # AltStore validates that the IPA's CFBundleShortVersionString matches
        # the version in altstore.json. Write the new version into mobile/app.json
        # before prebuild so it lands in Info.plist.
        #
        # IMPORTANT: only `expo.version` changes per tag. `runtimeVersion` must
        # stay a literal string ("1.0.0") so every IPA + OTA shares the same
        # update channel. If you set `runtimeVersion.policy = "appVersion"` again,
        # each IPA bakes a unique runtime and OTAs silently miss every phone.
        # The guard below fails the build if that ever drifts back.
        run: |
          VER="${{ steps.ver.outputs.version }}"
          python3 - <<EOF
          import json, sys
          p = "mobile/app.json"
          d = json.load(open(p))
          rv = d.get("expo", {}).get("runtimeVersion")
          if not isinstance(rv, str):
              print(f"::error::mobile/app.json runtimeVersion must be a fixed string. Got: {rv!r}")
              sys.exit(1)
          d["expo"]["version"] = "$VER"
          json.dump(d, open(p, "w"), indent=2)
          print(f"set version to $VER, runtimeVersion stays {rv}")
          EOF
          # Bake the same clean semver into the embedded JS bundle so the
          # in-app Settings shows the IPA's "Build" without an OTA suffix
          # until an OTA actually lands. The mobile-ota.yml workflow
          # overwrites this with "VER+N.sha" for post-release commits.
          echo "EXPO_PUBLIC_OTA_VERSION=$VER" >> "$GITHUB_ENV"

      - name: Expo prebuild (iOS)
        working-directory: mobile
        run: npx expo prebuild --platform ios --no-install --clean

      - name: Disable script-phase sandboxing (Xcode 16 + Node bundler)
        run: |
          sed -i '' 's/ENABLE_USER_SCRIPT_SANDBOXING = YES/ENABLE_USER_SCRIPT_SANDBOXING = NO/g' \
            mobile/ios/Expenses.xcodeproj/project.pbxproj

      - name: Patch Podfile — scoped modular headers for Firebase deps
        working-directory: mobile/ios
        # AppCheckCore (Swift) depends on GoogleUtilities + RecaptchaInterop,
        # neither of which define modules. pod install fails without modular
        # headers on those two. Global use_modular_headers! breaks RN 0.79
        # ('Redefinition of module react_runtime'), so scope to just these
        # two pods inside the main target.
        run: |
          python3 - <<'PY'
          import re
          p = "Podfile"
          src = open(p).read()
          if "GoogleUtilities" in src and "RecaptchaInterop" in src:
              print("already patched")
          else:
              inject = (
                  "  pod 'GoogleUtilities', :modular_headers => true\n"
                  "  pod 'RecaptchaInterop', :modular_headers => true\n"
              )
              src = re.sub(r"(target ['\"][^'\"]+['\"] do\n)", r"\1" + inject, src, count=1)
              open(p, "w").write(src)
              print("patched")
          PY

      - name: Pod install
        working-directory: mobile/ios
        run: pod install --repo-update

      - name: Archive
        working-directory: mobile/ios
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: dhishan
          SENTRY_PROJECT: expense-tracker-mobile
        run: |
          xcodebuild \
            -workspace Expenses.xcworkspace \
            -scheme Expenses \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/Expenses.xcarchive" \
            -destination 'generic/platform=iOS' \
            archive \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        run: |
          mkdir -p "$RUNNER_TEMP/ipa/Payload"
          cp -R "$RUNNER_TEMP/Expenses.xcarchive/Products/Applications/Expenses.app" \
            "$RUNNER_TEMP/ipa/Payload/"
          cd "$RUNNER_TEMP/ipa" && zip -qr "$RUNNER_TEMP/Expenses.ipa" Payload
          ls -lh "$RUNNER_TEMP/Expenses.ipa"

      - name: Create tag (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git tag "${{ steps.ver.outputs.tag }}" || true
          git push origin "${{ steps.ver.outputs.tag }}" || true

      - name: Upload IPA to GH Release
        env:
          GH_TOKEN: ${{ github.token }}
          CHANGELOG: ${{ steps.changelog.outputs.log }}
        run: |
          NOTES="What's changed:
          $CHANGELOG

          ---
          Built from ${{ github.sha }}."
          gh release create "${{ steps.ver.outputs.tag }}" "$RUNNER_TEMP/Expenses.ipa" \
            --title "Mobile v${{ steps.ver.outputs.version }}" \
            --notes "$NOTES" \
            || gh release upload "${{ steps.ver.outputs.tag }}" "$RUNNER_TEMP/Expenses.ipa" --clobber

      - name: Auth to GCS for shared source
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Update shared AltStore source on GCS
        env:
          CHANGELOG: ${{ steps.changelog.outputs.log }}
          GH_REPO: ${{ github.repository }}
        run: |
          export VER="${{ steps.ver.outputs.version }}"
          export TAG="${{ steps.ver.outputs.tag }}"
          export IPA_SIZE=$(stat -f %z "$RUNNER_TEMP/Expenses.ipa")
          export IPA_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Download the current source, mutate, re-upload.
          gcloud storage cp gs://blueelephants-altstore/altstore.json "$RUNNER_TEMP/altstore.json" \
            --project personal-projects-473219

          python3 - <<'PY'
          import json, os
          ver = os.environ["VER"]
          tag = os.environ["TAG"]
          changelog = os.environ.get("CHANGELOG", "").strip() or "- Minor improvements and fixes"
          desc = f"What's changed:\n{changelog}"
          p = f"{os.environ['RUNNER_TEMP']}/altstore.json"
          d = json.load(open(p))
          bid = "org.blueelephants.familyexpensetracker"
          app = next(a for a in d["apps"] if a["bundleIdentifier"] == bid)
          new_v = {
            "version": ver,
            "buildVersion": "1",
            "date": os.environ["IPA_DATE"],
            "localizedDescription": desc,
            "downloadURL": f"https://github.com/{os.environ['GH_REPO']}/releases/download/{tag}/Expenses.ipa",
            "size": int(os.environ["IPA_SIZE"]),
            "minOSVersion": "16.0",
          }
          app["versions"] = [new_v] + [v for v in app["versions"] if v["version"] != ver]
          json.dump(d, open(p, "w"), indent=2)
          print("updated", p)
          PY

          gcloud storage cp "$RUNNER_TEMP/altstore.json" \
            gs://blueelephants-altstore/altstore.json \
            --content-type=application/json \
            --cache-control="public,max-age=60" \
            --project personal-projects-473219

          # Mirror to frontend/public for the legacy Firebase URL.
          # Tag-triggered runs check out detached HEAD, so explicitly target
          # main first — BEFORE writing the file, otherwise the checkout
          # refuses to overwrite the modified working tree.
          git fetch origin main
          git checkout -B main origin/main
          cp "$RUNNER_TEMP/altstore.json" frontend/public/altstore.json
          git add frontend/public/altstore.json
          git diff --staged --quiet || (git commit -m "release: $TAG (AltStore source mirror)" && git push origin main)
