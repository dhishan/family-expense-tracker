name: Mobile OTA (EAS Update)

# Auto-pushes a JS-only update to the EAS `preview` channel on every push
# to main that touches mobile/. Phones pick it up on next app launch.
#
# Why this is cheap + safe:
# - Linux runner (free unlimited minutes for public repos)
# - JS-only — no native rebuild, no Apple Dev cost
# - EAS Update runtime version is pinned to 1.0.0 — if a JS bundle is
#   incompatible with the native shell, AltStore-installed apps fall
#   back to the embedded bundle automatically
# - Path filter scopes this to mobile/ changes — backend/web edits
#   don't trigger an OTA

on:
  push:
    branches: [main]
    paths:
      - "mobile/**"
      - ".github/workflows/mobile-ota.yml"

  workflow_dispatch:
    inputs:
      message:
        description: "Optional update message"
        required: false
        type: string
        default: "manual update"

permissions:
  contents: read

concurrency:
  # Coalesce rapid-fire pushes — only the last OTA in a cluster runs
  group: mobile-ota
  cancel-in-progress: true

jobs:
  ota:
    name: Push OTA to EAS preview
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install mobile deps
        working-directory: mobile
        run: npm ci

      - name: Resolve update message
        id: msg
        # Build a single-line message listing every commit subject since
        # the last successful OTA. We use the PREVIOUS push's commit
        # (HEAD~1..HEAD on push events) as a lower bound and fall back to
        # the last 5 commits if before/after isn't available. For
        # workflow_dispatch, the user-supplied message is used verbatim
        # unless it's the default "manual update" placeholder, in which
        # case we still summarize the recent commits.
        run: |
          set -e
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && \
             [ -n "${{ inputs.message }}" ] && \
             [ "${{ inputs.message }}" != "manual update" ]; then
            MSG="${{ inputs.message }}"
          else
            RANGE="${{ github.event.before }}..${{ github.sha }}"
            # Defensive: if `before` is the zero-SHA (initial push) or empty,
            # fall back to the last 5 commits.
            if [ -z "${{ github.event.before }}" ] || \
               [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
              SUBJECTS=$(git log -5 --pretty=format:'%s' --no-merges)
            else
              SUBJECTS=$(git log "$RANGE" --pretty=format:'%s' --no-merges 2>/dev/null || git log -5 --pretty=format:'%s' --no-merges)
            fi
            # Filter to only commits touching mobile/ — keeps the OTA log
            # honest about what shipped. Falls back to "all" if grep finds
            # nothing.
            MOBILE_ONLY=$(echo "$SUBJECTS" | head -10)
            # Join newline-separated subjects with " • " and cap at 250 chars
            # (EAS Update message limit is ~1024 but short = readable).
            MSG=$(echo "$MOBILE_ONLY" | tr '\n' '|' | sed 's/|$//' | sed 's/|/ • /g' | cut -c1-250)
            if [ -z "$MSG" ]; then
              MSG="JS update from $GITHUB_SHA"
            fi
          fi
          # Escape any backticks/dollar signs the CLI step might evaluate.
          MSG_ESCAPED=$(echo "$MSG" | tr -d '`$"')
          echo "message=$MSG_ESCAPED" >> $GITHUB_OUTPUT
          echo "Update message: $MSG_ESCAPED"

      - name: EAS Update → preview
        working-directory: mobile
        run: |
          npx eas-cli update --branch preview --message "${{ steps.msg.outputs.message }}" --non-interactive

      - name: Summary
        run: |
          echo "### Mobile OTA pushed" >> $GITHUB_STEP_SUMMARY
          echo "- Channel: preview" >> $GITHUB_STEP_SUMMARY
          echo "- Message: ${{ steps.msg.outputs.message }}" >> $GITHUB_STEP_SUMMARY
          echo "- Runtime: 1.0.0 (must match the .ipa runtime, or this update is ignored)" >> $GITHUB_STEP_SUMMARY
