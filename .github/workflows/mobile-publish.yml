name: Release IPA

# Tag-triggered: push `mobile-v1.0.1` and this builds the .ipa, publishes
# a GitHub Release, and bumps frontend/public/altstore.json so AltStore
# subscribers see the new version.
#
# Mirrors the working fitness-coach release-ipa.yml pattern.

on:
  push:
    tags:
      - 'mobile-v*'
  workflow_dispatch:
    inputs:
      version:
        description: "Semver (e.g. 1.0.1) — will create + push tag mobile-v<version>"
        required: true
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: mobile-publish
  cancel-in-progress: false

jobs:
  build-ipa:
    runs-on: macos-latest
    timeout-minutes: 45

    env:
      # Resolved from either the tag or the workflow_dispatch input below.
      VERSION: ${{ github.event.inputs.version && format('mobile-v{0}', github.event.inputs.version) || github.ref_name }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install mobile deps
        working-directory: mobile
        run: npm ci

      - name: Inject release version into app.json
        run: |
          VER="${VERSION#mobile-v}"
          python3 - <<EOF
          import json
          p = "mobile/app.json"
          d = json.load(open(p))
          d["expo"]["version"] = "$VER"
          json.dump(d, open(p, "w"), indent=2)
          print("set version to", "$VER")
          EOF

      - name: Expo prebuild (iOS)
        working-directory: mobile
        run: npx expo prebuild --platform ios --no-install --clean

      - name: Disable script-phase sandboxing (Xcode 16 + Node bundler)
        run: |
          sed -i '' 's/ENABLE_USER_SCRIPT_SANDBOXING = YES/ENABLE_USER_SCRIPT_SANDBOXING = NO/g' \
            mobile/ios/Expenses.xcodeproj/project.pbxproj

      - name: Patch Podfile — scoped modular headers for Firebase deps
        working-directory: mobile/ios
        # AppCheckCore (Swift) depends on GoogleUtilities + RecaptchaInterop,
        # neither of which define modules. Pod install fails without modular
        # headers on those two. Applying use_modular_headers! globally breaks
        # RN 0.79 (duplicate 'react_runtime' module), so scope to just these
        # two pods inside the main target.
        run: |
          python3 - <<'PY'
          import re
          p = "Podfile"
          src = open(p).read()
          if "GoogleUtilities" in src and "RecaptchaInterop" in src:
              print("already patched")
          else:
              inject = (
                  "  pod 'GoogleUtilities', :modular_headers => true\n"
                  "  pod 'RecaptchaInterop', :modular_headers => true\n"
              )
              # Insert right after the first `target '...' do` line
              src = re.sub(r"(target ['\"][^'\"]+['\"] do\n)", r"\1" + inject, src, count=1)
              open(p, "w").write(src)
              print("patched")
          PY
          grep -nE "GoogleUtilities|RecaptchaInterop|^target" Podfile | head -10

      - name: Pod install
        working-directory: mobile/ios
        run: pod install --repo-update

      - name: Archive
        working-directory: mobile/ios
        run: |
          xcodebuild \
            -workspace Expenses.xcworkspace \
            -scheme Expenses \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/Expenses.xcarchive" \
            -destination 'generic/platform=iOS' \
            archive \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        run: |
          mkdir -p "$RUNNER_TEMP/ipa/Payload"
          cp -R "$RUNNER_TEMP/Expenses.xcarchive/Products/Applications/Expenses.app" \
            "$RUNNER_TEMP/ipa/Payload/"
          cd "$RUNNER_TEMP/ipa" && zip -qr "$RUNNER_TEMP/Expenses.ipa" Payload
          ls -lh "$RUNNER_TEMP/Expenses.ipa"

      - name: Create tag (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git tag "$VERSION" || true
          git push origin "$VERSION" || true

      - name: Upload IPA to GH Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$VERSION" "$RUNNER_TEMP/Expenses.ipa" \
            --title "Mobile ${VERSION#mobile-}" \
            --notes "AltStore-source release. Built from ${{ github.sha }}." \
            || gh release upload "$VERSION" "$RUNNER_TEMP/Expenses.ipa" --clobber

      - name: Update altstore.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VER="${VERSION#mobile-v}"
          IPA_SIZE=$(stat -f %z "$RUNNER_TEMP/Expenses.ipa")
          IPA_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          python3 - <<EOF
          import json
          p = "frontend/public/altstore.json"
          d = json.load(open(p))
          bid = "org.blueelephants.familyexpensetracker"
          app = next(a for a in d["apps"] if a["bundleIdentifier"] == bid)
          new_v = {
            "version": "$VER",
            "buildVersion": "1",
            "date": "$IPA_DATE",
            "localizedDescription": "New version $VER",
            "downloadURL": "https://github.com/${{ github.repository }}/releases/download/$VERSION/Expenses.ipa",
            "size": $IPA_SIZE,
            "minOSVersion": "16.0",
          }
          app["versions"] = [new_v] + [v for v in app["versions"] if v["version"] != "$VER"]
          json.dump(d, open(p, "w"), indent=2)
          EOF

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git checkout main
          git add frontend/public/altstore.json
          git commit -m "release: expenses $VERSION (AltStore source)" || echo "no changes"
          git push origin main || true
